<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Finance Tracker</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --text: #1a1d24;
      --subtle: #6b7280;
      --income: #10b981;
      --expense: #ef4444;
      --savings: #3b82f6;
      --border: #e5e7eb;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --purple: #6366f1;
      --purple2: #8b5cf6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── LOADING ── */
    #loadingScreen {
      position: fixed; inset: 0; background: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      z-index: 999;
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── AUTH PAGE ── */
    #authPage {
      display: none; min-height: 100vh;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
      align-items: center; justify-content: center; padding: 24px;
    }
    .auth-box {
      background: #fff; border-radius: 20px; padding: 32px 28px;
      width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(99,102,241,0.25);
    }
    .auth-logo { text-align: center; margin-bottom: 24px; }
    .auth-logo h1 { font-size: 28px; font-weight: 800; color: var(--purple); }
    .auth-logo p { font-size: 14px; color: var(--subtle); margin-top: 4px; }

    .auth-tabs { display: flex; background: var(--bg); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
    .auth-tab {
      flex: 1; padding: 10px; text-align: center; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; color: var(--subtle); transition: all 0.2s;
    }
    .auth-tab.active { background: #fff; color: var(--purple); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    .auth-field { margin-bottom: 16px; }
    .auth-field label { display: block; font-size: 13px; color: var(--subtle); margin-bottom: 6px; font-weight: 500; }
    .auth-field input {
      width: 100%; padding: 13px 14px; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 15px; background: #fafafa; transition: border-color 0.2s;
    }
    .auth-field input:focus { outline: none; border-color: var(--purple); background: #fff; }

    .btn-auth {
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--purple), var(--purple2));
      color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 4px; transition: opacity 0.2s;
    }
    .btn-auth:hover { opacity: 0.92; }
    .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }

    .auth-error {
      background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
      padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: none;
    }

    /* ── APP PAGE ── */
    #appPage { display: none; padding: 16px; padding-bottom: 80px; max-width: 800px; margin: 0 auto; }

    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    .app-header h1 { font-size: 20px; font-weight: 800; color: var(--purple); }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-email { font-size: 12px; color: var(--subtle); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-logout {
      padding: 7px 14px; background: #f3f4f6; border: 1px solid var(--border);
      border-radius: 8px; font-size: 13px; cursor: pointer; color: var(--text); font-weight: 500;
    }
    .btn-logout:hover { background: #fee2e2; color: #dc2626; border-color: #fecaca; }

    /* Summary Cards */
    .summary-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .summary-top { display: flex; gap: 10px; justify-content: center; }
    .summary-top .card { flex: 1; max-width: 200px; }
    .card { background: var(--card); padding: 14px; border-radius: 12px; box-shadow: var(--shadow); text-align: center; }
    .card h3 { font-size: 12px; color: var(--subtle); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .card p { font-size: 17px; font-weight: 800; }
    .card.total { background: linear-gradient(135deg, #f9fafb, #eef2ff); border: 1px solid #c7d2fe; }
    .income { color: var(--income); }
    .expense { color: var(--expense); }
    .savings { color: var(--savings); }

    /* Form */
    .form-box { background: var(--card); padding: 16px; border-radius: 14px; box-shadow: var(--shadow); margin-bottom: 18px; }
    .form-box h2 { font-size: 15px; font-weight: 700; margin-bottom: 14px; color: var(--text); }
    .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .col { flex: 1; display: flex; flex-direction: column; }
    label { font-size: 13px; color: var(--subtle); margin-bottom: 4px; font-weight: 500; }
    input, select {
      padding: 12px; border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 15px; background: #fafafa; width: 100%; touch-action: manipulation;
    }
    input:focus, select:focus { outline: none; border-color: var(--purple); background: #fff; }

    .btn-primary {
      background: linear-gradient(135deg, var(--purple), var(--purple2)); color: white; border: none;
      padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 700; width: 100%; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
    .tab {
      padding: 10px 16px; background: var(--card); border-radius: 99px; font-size: 14px;
      white-space: nowrap; border: 1.5px solid var(--border); cursor: pointer; flex-shrink: 0; font-weight: 500;
    }
    .tab.active { background: var(--purple); color: white; border-color: var(--purple); }

    /* List */
    .list { display: flex; flex-direction: column; gap: 10px; }
    .item {
      background: var(--card); padding: 14px; border-radius: 12px; box-shadow: var(--shadow);
      display: flex; justify-content: space-between; align-items: center; border-left: 5px solid transparent;
    }
    .item.income { border-left-color: var(--income); }
    .item.expense { border-left-color: var(--expense); }
    .item.savings { border-left-color: var(--savings); }
    .info h4 { font-size: 15px; margin-bottom: 4px; font-weight: 600; }
    .info span { font-size: 12px; color: var(--subtle); }
    .amount { font-weight: 700; font-size: 16px; text-align: right; min-width: 90px; }
    .btn-del {
      background: #fee2e2; color: #dc2626; border: none; width: 32px; height: 32px;
      border-radius: 8px; margin-left: 10px; cursor: pointer; font-size: 18px; line-height: 1;
      flex-shrink: 0;
    }

    /* Sync status */
    .sync-status {
      text-align: center; font-size: 12px; color: var(--subtle);
      padding: 8px; margin-bottom: 8px;
    }
    .sync-status.saving { color: #f59e0b; }
    .sync-status.saved { color: var(--income); }
    .sync-status.error { color: var(--expense); }

    /* Empty state */
    .empty { text-align: center; color: var(--subtle); padding: 32px 20px; }
    .empty p { margin-top: 8px; font-size: 14px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1a1d24; color: #fff; padding: 12px 20px; border-radius: 10px;
      font-size: 14px; z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    @media (min-width: 600px) {
      .list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loadingScreen">
    <div class="spinner"></div>
    <p style="color:#6b7280;font-size:14px;">Memuat...</p>
  </div>

  <!-- Auth Page -->
  <div id="authPage" style="display:none;min-height:100vh;display:none;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#a78bfa 100%);">
    <div class="auth-box">
      <div class="auth-logo">
        <h1>💰 Finance Tracker</h1>
        <p>Catat keuangan kamu dari mana saja</p>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">Masuk</div>
        <div class="auth-tab" id="tabRegister" onclick="switchAuthTab('register')">Daftar</div>
      </div>

      <div id="authError" class="auth-error"></div>

      <div id="formLogin">
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="email@kamu.com" autocomplete="email">
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Minimal 6 karakter" autocomplete="current-password">
        </div>
        <button class="btn-auth" id="btnLogin" onclick="doLogin()">Masuk</button>
      </div>

      <div id="formRegister" style="display:none;">
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="email@kamu.com" autocomplete="email">
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Minimal 6 karakter" autocomplete="new-password">
        </div>
        <div class="auth-field">
          <label>Konfirmasi Password</label>
          <input type="password" id="regPassword2" placeholder="Ulangi password" autocomplete="new-password">
        </div>
        <button class="btn-auth" id="btnRegister" onclick="doRegister()">Buat Akun</button>
      </div>
    </div>
  </div>

  <!-- App Page -->
  <div id="appPage" style="display:none;">
    <div style="max-width:800px;margin:0 auto;padding:16px;padding-bottom:80px;">

      <div class="app-header">
        <h1>💰 Finance Tracker</h1>
        <div class="user-info">
          <span class="user-email" id="userEmailDisplay"></span>
          <button class="btn-logout" onclick="doLogout()">Keluar</button>
        </div>
      </div>

      <div class="summary-grid">
        <div class="summary-top">
          <div class="card"><h3>Pemasukan</h3><p class="income" id="sumIncome">Rp0</p></div>
          <div class="card"><h3>Pengeluaran</h3><p class="expense" id="sumExpense">Rp0</p></div>
          <div class="card"><h3>Tabungan</h3><p class="savings" id="sumSavings">Rp0</p></div>
        </div>
        <div class="card total"><h3>Sisa Saldo Bersih</h3><p id="sumBalance">Rp0</p></div>
      </div>

      <div class="form-box">
        <h2>+ Catat Transaksi</h2>
        <div class="form-row">
          <div class="col" style="flex:1.2"><label>Tanggal</label><input type="date" id="inputDate"></div>
          <div class="col" style="flex:0.8"><label>Jumlah (Rp)</label><input type="text" id="inputAmount" placeholder="0" inputmode="numeric"></div>
        </div>
        <div class="form-row">
          <div class="col"><label>Keterangan</label><input type="text" id="inputDesc" placeholder="Gaji, Belanja, dll"></div>
          <div class="col"><label>Jenis</label>
            <select id="inputType">
              <option value="income">📥 Pemasukan</option>
              <option value="expense">🛒 Pengeluaran</option>
              <option value="savings">💸 Tabungan</option>
            </select>
          </div>
        </div>
        <div id="syncStatus" class="sync-status"></div>
        <button class="btn-primary" id="btnAdd" onclick="addTransaction()">+ Simpan Transaksi</button>
      </div>

      <div class="tabs">
        <div class="tab active" data-filter="all">Semua</div>
        <div class="tab" data-filter="income">📥 Pemasukan</div>
        <div class="tab" data-filter="expense">🛒 Pengeluaran</div>
        <div class="tab" data-filter="savings">💸 Tabungan</div>
      </div>

      <div class="list" id="txList">
        <div class="empty">
          <div style="font-size:32px;">📋</div>
          <p>Memuat transaksi...</p>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
      signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, deleteDoc, doc,
      onSnapshot, query, orderBy, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ── Firebase Config ──────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyDJsUqYcNSwcwImS5zXYtIIo7hNvXEJAic",
      authDomain: "finance-trace-9582e.firebaseapp.com",
      projectId: "finance-trace-9582e",
      storageBucket: "finance-trace-9582e.firebasestorage.app",
      messagingSenderId: "113395402248",
      appId: "1:113395402248:web:48dad485b8c7506c8cb3bd",
      measurementId: "G-YNW35J0CG5"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let currentUser = null;
    let unsubscribeSnapshot = null;
    let transactions = [];
    let currentFilter = 'all';

    // ── Auth State ────────────────────────────────────────────────────────────
    onAuthStateChanged(auth, (user) => {
      document.getElementById('loadingScreen').style.display = 'none';
      if (user) {
        currentUser = user;
        showApp(user);
      } else {
        currentUser = null;
        showAuth();
      }
    });

    function showAuth() {
      if (unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }
      document.getElementById('authPage').style.display  = 'flex';
      document.getElementById('appPage').style.display   = 'none';
    }

    function showApp(user) {
      document.getElementById('authPage').style.display  = 'none';
      document.getElementById('appPage').style.display   = 'block';
      document.getElementById('userEmailDisplay').textContent = user.email;
      document.getElementById('inputDate').valueAsDate = new Date();
      listenTransactions(user.uid);
    }

    // ── Firestore Realtime ────────────────────────────────────────────────────
    function listenTransactions(uid) {
      if (unsubscribeSnapshot) unsubscribeSnapshot();
      const q = query(
        collection(db, 'users', uid, 'transactions'),
        orderBy('date', 'desc')
      );
      unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
        transactions = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        render();
      }, (err) => {
        console.error(err);
        showToast('Gagal memuat data. Cek koneksi internet.');
      });
    }

    // ── Auth Actions ──────────────────────────────────────────────────────────
    window.switchAuthTab = (tab) => {
      document.getElementById('authError').style.display = 'none';
      document.getElementById('formLogin').style.display    = tab === 'login'    ? 'block' : 'none';
      document.getElementById('formRegister').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    };

    window.doLogin = async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pass  = document.getElementById('loginPassword').value;
      if (!email || !pass) return showAuthError('Email dan password wajib diisi.');
      const btn = document.getElementById('btnLogin');
      btn.disabled = true; btn.textContent = 'Masuk...';
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch (e) {
        showAuthError(friendlyError(e.code));
        btn.disabled = false; btn.textContent = 'Masuk';
      }
    };

    window.doRegister = async () => {
      const email = document.getElementById('regEmail').value.trim();
      const pass  = document.getElementById('regPassword').value;
      const pass2 = document.getElementById('regPassword2').value;
      if (!email || !pass) return showAuthError('Email dan password wajib diisi.');
      if (pass !== pass2) return showAuthError('Password tidak cocok.');
      if (pass.length < 6) return showAuthError('Password minimal 6 karakter.');
      const btn = document.getElementById('btnRegister');
      btn.disabled = true; btn.textContent = 'Membuat akun...';
      try {
        await createUserWithEmailAndPassword(auth, email, pass);
        showToast('Akun berhasil dibuat! Selamat datang 🎉');
      } catch (e) {
        showAuthError(friendlyError(e.code));
        btn.disabled = false; btn.textContent = 'Buat Akun';
      }
    };

    window.doLogout = async () => {
      if (!confirm('Yakin ingin keluar?')) return;
      await signOut(auth);
    };

    function showAuthError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function friendlyError(code) {
      const map = {
        'auth/invalid-email':          'Format email tidak valid.',
        'auth/user-not-found':         'Email tidak terdaftar.',
        'auth/wrong-password':         'Password salah.',
        'auth/email-already-in-use':   'Email sudah terdaftar. Silakan masuk.',
        'auth/weak-password':          'Password terlalu lemah.',
        'auth/invalid-credential':     'Email atau password salah.',
        'auth/too-many-requests':      'Terlalu banyak percobaan. Coba lagi nanti.',
        'auth/network-request-failed': 'Tidak ada koneksi internet.',
      };
      return map[code] || `Terjadi kesalahan (${code}).`;
    }

    // ── Transaction Actions ───────────────────────────────────────────────────
    window.addTransaction = async () => {
      const date   = document.getElementById('inputDate').value;
      const raw    = document.getElementById('inputAmount').value.replace(/\D/g, '');
      const amount = parseInt(raw, 10);
      const desc   = document.getElementById('inputDesc').value.trim();
      const type   = document.getElementById('inputType').value;

      if (!date || !desc || isNaN(amount) || amount <= 0) {
        showToast('Mohon isi semua field dengan benar.');
        return;
      }

      const btn = document.getElementById('btnAdd');
      btn.disabled = true; btn.textContent = 'Menyimpan...';
      setSyncStatus('saving', '⏳ Menyimpan...');

      try {
        await addDoc(collection(db, 'users', currentUser.uid, 'transactions'), {
          date, desc, amount, type,
          createdAt: serverTimestamp()
        });
        document.getElementById('inputAmount').value = '';
        document.getElementById('inputDesc').value   = '';
        setSyncStatus('saved', '✅ Tersimpan di cloud');
        showToast('Transaksi berhasil disimpan!');
        setTimeout(() => setSyncStatus('', ''), 3000);
      } catch (e) {
        console.error(e);
        setSyncStatus('error', '❌ Gagal menyimpan');
        showToast('Gagal menyimpan. Cek koneksi internet.');
      } finally {
        btn.disabled = false; btn.textContent = '+ Simpan Transaksi';
      }
    };

    window.deleteTransaction = async (id) => {
      if (!confirm('Hapus transaksi ini?')) return;
      try {
        await deleteDoc(doc(db, 'users', currentUser.uid, 'transactions', id));
        showToast('Transaksi dihapus.');
      } catch (e) {
        showToast('Gagal menghapus. Coba lagi.');
      }
    };

    // ── Format & Render ───────────────────────────────────────────────────────
    function formatIDR(num) {
      return new Intl.NumberFormat('id-ID', {
        style: 'currency', currency: 'IDR', maximumFractionDigits: 0
      }).format(num);
    }

    function render() {
      const filtered = currentFilter === 'all'
        ? transactions
        : transactions.filter(t => t.type === currentFilter);

      // Summary (always from all transactions)
      let inc = 0, exp = 0, sav = 0;
      transactions.forEach(t => {
        if      (t.type === 'income')  inc += t.amount;
        else if (t.type === 'expense') exp += t.amount;
        else if (t.type === 'savings') sav += t.amount;
      });
      document.getElementById('sumIncome').textContent  = formatIDR(inc);
      document.getElementById('sumExpense').textContent = formatIDR(exp);
      document.getElementById('sumSavings').textContent = formatIDR(sav);
      const bal   = inc - exp - sav;
      const balEl = document.getElementById('sumBalance');
      balEl.textContent = formatIDR(bal);
      balEl.style.color = bal >= 0 ? 'var(--text)' : '#dc2626';

      const listEl = document.getElementById('txList');
      if (filtered.length === 0) {
        listEl.innerHTML = `
          <div class="empty">
            <div style="font-size:36px;">📋</div>
            <p>Belum ada transaksi. Mulai catat di atas!</p>
          </div>`;
        return;
      }

      const typeLabel = { income: 'Pemasukan', expense: 'Pengeluaran', savings: 'Tabungan' };
      const typeColor = { income: 'var(--income)', expense: 'var(--expense)', savings: 'var(--savings)' };
      const typeSign  = { income: '+', expense: '-', savings: '💸' };

      listEl.innerHTML = filtered.map(t => `
        <div class="item ${t.type}">
          <div class="info">
            <h4>${escHtml(t.desc)}</h4>
            <span>${formatDate(t.date)} • ${typeLabel[t.type]}</span>
          </div>
          <div style="display:flex;align-items:center;gap:0;">
            <div class="amount" style="color:${typeColor[t.type]}">
              ${typeSign[t.type]} ${formatIDR(t.amount)}
            </div>
            <button class="btn-del" onclick="deleteTransaction('${t.id}')">×</button>
          </div>
        </div>
      `).join('');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const [y, m, d] = dateStr.split('-');
      return new Date(+y, +m - 1, +d).toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' });
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function setSyncStatus(type, msg) {
      const el = document.getElementById('syncStatus');
      el.textContent = msg;
      el.className = 'sync-status ' + type;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── Amount Input Format ───────────────────────────────────────────────────
    const amountInput = document.getElementById('inputAmount');
    amountInput.addEventListener('input', function () {
      const cursor  = this.selectionStart;
      const prevLen = this.value.length;
      const raw     = this.value.replace(/\D/g, '');
      if (!raw) { this.value = ''; return; }
      this.value = new Intl.NumberFormat('id-ID').format(parseInt(raw, 10));
      const diff = this.value.length - prevLen;
      this.setSelectionRange(cursor + diff, cursor + diff);
    });
    amountInput.addEventListener('focus', function () {
      this.value = this.value.replace(/\D/g, '');
    });
    amountInput.addEventListener('blur', function () {
      const raw = this.value.replace(/\D/g, '');
      if (!raw) return;
      this.value = new Intl.NumberFormat('id-ID').format(parseInt(raw, 10));
    });

    // ── Tabs ──────────────────────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        render();
      });
    });

    // Enter key on auth inputs
    document.getElementById('loginPassword').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.doLogin();
    });
    document.getElementById('regPassword2').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.doRegister();
    });
  </script>
</body>
</html>
